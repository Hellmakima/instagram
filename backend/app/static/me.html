<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Me Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      async function fetchMe() {
        try {
          // First attempt to fetch user data
          const res = await fetch("/auth/me", { credentials: "include" });
          
          // If successful, display the data
          if (res.ok) {
            const data = await res.json();
            document.getElementById("output").textContent = JSON.stringify(data, null, 2);
            return;
          }

          // If unauthorized (401), try refreshing the token
          if (res.status === 401) {
            const refreshRes = await fetch("/auth/refresh", {
              method: "POST",
              credentials: "include",
            });

            // If refresh failed, redirect to login
            if (!refreshRes.ok) {
              return window.location.replace("/login.html");
            }

            // Second attempt with fresh token
            const retryRes = await fetch("/auth/me", { credentials: "include" });
            
            // If successful, display the data
            if (retryRes.ok) {
              const data = await retryRes.json();
              document.getElementById("output").textContent = JSON.stringify(data, null, 2);
              return;
            }
          }

          // If we get here, either:
          // 1. The initial error wasn't 401, or
          // 2. The retry after refresh failed
          window.location.replace("/login.html");
          
        } catch (err) {
          console.error("Fetch error:", err);
          document.getElementById("output").textContent = `Error: ${err.message}`;
          // Optional: redirect after showing error for a while
          setTimeout(() => window.location.replace("/login.html"), 3000);
        }
      }

      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
      }

      async function logout() {
        const csrfToken = getCookie('csrf_token');
        const res = await fetch("/auth/logout", {
          method: "POST",
          headers: {
            "X-CSRF-Token": csrfToken,
          },
          credentials: "include",
        });
        if (res.ok) {
          window.location.replace("/login.html");
        } else {
          alert("Error during logout");
        }
      }

      window.onload = fetchMe;
    </script>    
  </head>
  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-6 rounded shadow-md w-full max-w-md">
      <h2 class="text-xl font-bold mb-4">/me Endpoint Result</h2>
      <pre id="output" class="bg-gray-100 p-4 rounded text-sm border"></pre>
      <div class="mt-4">
        <button
          onclick="logout()"
          class="w-full py-2 px-4 bg-red-600 text-white rounded hover:bg-red-700 focus:outline-none"
        >
          Logout
        </button>
      </div>
    </div>
  </body>
</html>
